services:
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
    container_name: neural-knowledge-engine-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
    container_name: neural-knowledge-engine-worker
    env_file:
      - .env
    command: celery -A workers.ingestion_worker.celery_app worker --loglevel=info
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: neural-knowledge-engine-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    container_name: neural-knowledge-engine-postgres
    environment:
      POSTGRES_USER: neural
      POSTGRES_PASSWORD: neural
      POSTGRES_DB: neural_knowledge_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: neural-knowledge-engine-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

volumes:
  postgres_data: